<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poverty Impact - Combined Autumn Budget 2025</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Serif:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 16px; font-family: 'Roboto Serif', serif; background: white; }
        #chart { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        const data = {"2026-27": [-0.69, -1.02, -2.3, -3.51, -0.34, 0.0], "2027-28": [-0.69, -1.05, -2.31, -3.59, -0.33, 0.0], "2028-29": [-0.74, -0.99, -2.5, -3.46, -0.37, 0.08], "2029-30": [-0.73, -0.94, -2.47, -3.35, -0.36, 0.05], "2030-31": [-0.81, -1.02, -2.88, -3.77, -0.37, 0.14]};
        const years = ["2026-27", "2027-28", "2028-29", "2029-30", "2030-31"];
        const labels = ["Overall<br>(BHC)", "Overall<br>(AHC)", "Child<br>(BHC)", "Child<br>(AHC)", "Working-age<br>(BHC)", "Pensioner<br>(BHC)"];

        const traces = years.map((year, i) => {
            const values = data[year];
            const colors = values.map(v => v < 0 ? '#2C6496' : '#616161');
            return {
                x: labels,
                y: values,
                type: 'bar',
                marker: { color: colors },
                text: values.map(v => (v >= 0 ? '+' : '') + v.toFixed(2) + 'pp'),
                textposition: 'outside',
                textfont: { family: 'Roboto Serif', size: 11 },
                hovertemplate: '%{x}<br>Change: %{y:+.2f}pp<extra></extra>',
                visible: i === 0,
                name: year
            };
        });

        const steps = years.map((year, i) => ({
            method: 'animate',
            args: [[year], { frame: { duration: 0, redraw: true }, mode: 'immediate' }],
            label: year
        }));

        const layout = {
            xaxis: {
                title: 'Poverty measure',
                tickfont: { family: 'Roboto Serif', size: 10 },
                showgrid: false
            },
            yaxis: {
                title: 'Change in poverty headcount rate (pp)',
                ticksuffix: 'pp',
                showgrid: true,
                gridcolor: '#e0e0e0',
                range: [-5, 1],
                zeroline: true,
                zerolinecolor: '#333',
                zerolinewidth: 2
            },
            height: 500,
            margin: { l: 80, r: 50, b: 120, t: 60 },
            font: { family: 'Roboto Serif' },
            showlegend: false,
            sliders: [{
                active: 0,
                steps: steps,
                x: 0.2,
                len: 0.6,
                y: 1.1,
                currentvalue: { visible: false },
                font: { family: 'Roboto Serif' }
            }],
            updatemenus: [{
                type: 'buttons',
                showactive: false,
                x: 0.1,
                y: 1.15,
                xanchor: 'right',
                buttons: [{
                    label: 'Play',
                    method: 'animate',
                    args: [null, { frame: { duration: 1000, redraw: true }, fromcurrent: true, mode: 'afterall' }]
                }]
            }]
        };

        // Create frames for animation
        const frames = years.map(year => ({
            name: year,
            data: [{
                y: data[year],
                text: data[year].map(v => (v >= 0 ? '+' : '') + v.toFixed(2) + 'pp'),
                marker: { color: data[year].map(v => v < 0 ? '#2C6496' : '#616161') }
            }]
        }));

        Plotly.newPlot('chart', traces, layout).then(() => {
            Plotly.addFrames('chart', frames);
        });
    </script>
</body>
</html>
